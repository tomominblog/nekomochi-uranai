name: Update LINE links once

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-line-links:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Replace LINE links
        run: |
          perl -pi -e 's#https://lin\.ee/[A-Za-z0-9]+#https://lin.ee/PbAZVlC#g' *.html
          rm .github/workflows/update-line-links-once.yml
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.html .github/workflows/update-line-links-once.yml
          if ! git diff --cached --quiet; then
            git commit -m "Update official LINE links"
            git push
          fi
